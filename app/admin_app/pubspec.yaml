name: admin_app
description: Sarkis Delivery - admin / driver app (v2 dark premium).
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase (versions compatible with Flutter 3.44 / Dart 3.9)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  scrollable_positioned_list: ^0.3.8

  # Media
  image_picker: ^1.1.2
  record: ^6.0.0
  audioplayers: ^6.1.0
  video_player: ^2.9.1
  path_provider: ^2.1.4
  cross_file: ^0.3.4

  # State / storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI / design system
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  grouped_list: ^5.1.2
  badges: ^3.1.2

  # Maps / routing
  google_maps_flutter: ^2.9.0
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.5
  geolocator: ^13.0.1
  http: ^1.2.1
  flutter_dotenv: ^5.1.0
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#C8972A"
  adaptive_icon_foreground: "assets/icon/wheat_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - .env
