name: customer_app
description: Sarko Delivery - customer delivery app (v2 dark premium).
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase (versions compatible with Flutter 3.44 / Dart 3.9)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  scrollable_positioned_list: ^0.3.8

  # Media
  image_picker: ^1.1.2
  record: ^6.0.0
  audioplayers: ^6.1.0
  video_player: ^2.9.1
  path_provider: ^2.1.4
  cross_file: ^0.3.4

  # State / storage
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.26
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  socket_io_client: ^3.0.2
  connectivity_plus: ^6.1.0

  # UI / design system
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  confetti: ^0.7.0
  lottie: ^3.1.0

  # Auth / utils
  pin_code_fields: ^8.0.1
  fluttertoast: ^8.2.4
  intl: ^0.20.2
  url_launcher: ^6.2.5
  http: ^1.2.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2E2F36"
  adaptive_icon_foreground: "assets/icon/adaptive_fg.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
    - assets/animations/
