services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sarkis
      POSTGRES_PASSWORD: sarkis_dev_password
      POSTGRES_DB: sarkis
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarkis -d sarkis"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    profiles: ["prod"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sarkis:sarkis_dev_password@db:5432/sarkis?schema=public
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
