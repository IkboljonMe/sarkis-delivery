name: admin_app
description: Sarkis Bread - admin / driver app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  provider: ^6.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  fluttertoast: ^8.2.4
  intl: ^0.20.2
  grouped_list: ^5.1.2
  badges: ^3.1.2

  # Used by fcm_service.dart for the HTTP v1 access-token flow.
  http: ^1.2.1
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
